
services:

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    working_dir: /app
    command: npm run dev
    ports:
      - '7777:4000'
      - '5555:5555' 
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: cameras_db
    env_file:  
      - ./backend/.env 
  postgres:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cameras_db
    ports:
      - '6432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '8888:80'
    depends_on:
      - postgres    
volumes:
  postgres-data:      